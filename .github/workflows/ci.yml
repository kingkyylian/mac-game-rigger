name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  alpha-smoke:
    name: Alpha smoke gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Run local alpha smoke gate
        run: scripts/run_full_alpha_smoke.sh --skip-blender

      - name: Upload add-on package
        uses: actions/upload-artifact@v4
        with:
          name: MacGameRigger-0.1.0
          path: dist/MacGameRigger-0.1.0.zip
          if-no-files-found: error
